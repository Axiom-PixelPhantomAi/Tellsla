workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Install Fastlane
        script: |
          sudo gem install -N fastlane
          fastlane --version
          echo "✅ Fastlane installed"
      
      - name: Generate App Store Connect API Key
        script: |
          set -e
          python3 << 'EOF'
          import json, base64, os
          
          issuer = os.environ.get("APP_STORE_CONNECT_ISSUER_ID")
          key_id = os.environ.get("APP_STORE_CONNECT_KEY_IDENTIFIER")
          key_b64 = os.environ.get("APP_STORE_CONNECT_PRIVATE_KEY")
          
          key_data = base64.b64decode(key_b64).decode('utf-8')
          
          api_key = {
            "key_id": key_id,
            "issuer_id": issuer,
            "key": key_data,
            "in_house": False
          }
          
          os.makedirs("fastlane", exist_ok=True)
          with open("fastlane/app_store_connect_key.json", "w") as f:
            json.dump(api_key, f, indent=2)
          
          os.chmod("fastlane/app_store_connect_key.json", 0o600)
          print("✅ API key generated")
          EOF
      
      - name: Build & Upload with Fastlane
        script: |
          cd fastlane
          fastlane testflight
    
    artifacts:
      - build/ipa/Tellsla.ipa
    
    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
