workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Setup API Key & Bypass Signing
        script: |
          set -e
          
          # Decode API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          
          # Create bypass keychain to skip account requirement
          security create-keychain -p "" /tmp/build.keychain 2>/dev/null || true
          security default-keychain -s /tmp/build.keychain
          security unlock-keychain -p "" /tmp/build.keychain
          security set-keychain-settings -lut 3600 /tmp/build.keychain
          
          echo "✅ Setup complete"
      
      - name: Build Unsigned Archive
        script: |
          set -e
          
          # Completely disable code signing to bypass provisioning requirements
          xcodebuild \
            -project Tellsla.xcodeproj \
            -scheme Tellsla \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -archivePath build/Tellsla.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            OTHER_CODE_SIGN_FLAGS="" \
            archive 2>&1 | tee build.log
          
          echo "✅ Archive created (unsigned)"
          ls -lh build/Tellsla.xcarchive
      
      - name: Export Signed IPA
        script: |
          set -e
          
          # Export with signing enabled and allow provisioning updates
          xcodebuild -exportArchive \
            -archivePath build/Tellsla.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" 2>&1 | tee export.log
          
          echo "✅ IPA exported"
          ls -lh build/ipa/Tellsla.ipa
      
      - name: Upload to TestFlight
        script: |
          set -e
          
          echo "📤 Uploading to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/Tellsla.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress 2>&1 | tee upload.log
          
          echo "✅ Upload successful - check App Store Connect"
    
    artifacts:
      - build/ipa/Tellsla.ipa
      - build.log
      - export.log
      - upload.log
    
    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
