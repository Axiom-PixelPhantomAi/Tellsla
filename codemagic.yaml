workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Setup App Store Connect API Key
        script: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo "✅ API key ready"
      
      - name: Build for Archive (No Code Signing)
        script: |
          set -e
          
          # Force disable code signing - we'll sign at export step
          xcodebuild build-for-testing \
            -project Tellsla.xcodeproj \
            -scheme Tellsla \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_CODE_SIGN_FLAGS="" \
            2>&1 | tail -50
          
          echo "✅ Build completed without signing"
      
      - name: Create Archive (No Code Signing)
        script: |
          set -e
          
          xcodebuild archive \
            -project Tellsla.xcodeproj \
            -scheme Tellsla \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -archivePath build/Tellsla.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_CODE_SIGN_FLAGS="" \
            2>&1 | tail -50
          
          echo "✅ Archive created (unsigned)"
          ls -lh build/Tellsla.xcarchive
      
      - name: Export & Sign IPA
        script: |
          set -e
          
          # NOW enable signing at export time with -allowProvisioningUpdates
          xcodebuild -exportArchive \
            -archivePath build/Tellsla.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            2>&1 | tail -50
          
          echo "✅ IPA exported and signed"
          ls -lh build/ipa/Tellsla.ipa
      
      - name: Upload to TestFlight
        script: |
          set -e
          
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/Tellsla.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress
          
          echo "✅ TestFlight upload successful"
    
    artifacts:
      - build/ipa/Tellsla.ipa
    
    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
