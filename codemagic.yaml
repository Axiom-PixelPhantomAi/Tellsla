workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        XCODE_PROJECT: Tellsla.xcodeproj
        XCODE_SCHEME: Tellsla
        BUNDLE_ID: app.rork.tellsla
    scripts:
      - name: Build Archive
        script: |
          set -e
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            -archivePath "build/Tellsla.xcarchive" \
            -allowProvisioningUpdates \
            archive
      
      - name: Export IPA
        script: |
          set -e
          xcodebuild -exportArchive \
            -archivePath "build/Tellsla.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath build/ipa \
            -allowProvisioningUpdates
      
      - name: Upload to TestFlight
        script: |
          set -e
          IPA_PATH="build/ipa/Tellsla.ipa"
          if [ ! -f "$IPA_PATH" ]; then
            echo "❌ IPA not found at $IPA_PATH"
            exit 1
          fi
          xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
    
    artifacts:
      - build/ipa/Tellsla.ipa

    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
