workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        XCODE_PROJECT: Tellsla.xcodeproj
        XCODE_SCHEME: Tellsla
        BUNDLE_ID: app.rork.tellsla
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Setup App Store Connect Credentials
        script: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo "✅ App Store Connect API key configured"
      
      - name: Build Archive (No Signing)
        script: |
          set -e
          
          # Archive WITHOUT code signing - just compile
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -archivePath "build/Tellsla.xcarchive" \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive
          
          echo "✅ Unsigned archive created"
      
      - name: Export IPA (with Auto Signing)
        script: |
          set -e
          
          # Export with -allowProvisioningUpdates to auto-create profiles
          # This step does the actual code signing via App Store Connect
          xcodebuild -exportArchive \
            -archivePath "build/Tellsla.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath "build/ipa" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM"
          
          echo "✅ IPA exported with code signing"
          ls -lh build/ipa/Tellsla.ipa
      
      - name: Upload to TestFlight
        script: |
          set -e
          
          if [ ! -f "build/ipa/Tellsla.ipa" ]; then
            echo "❌ IPA file not found at build/ipa/Tellsla.ipa"
            exit 1
          fi
          
          echo "📤 Uploading to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file "build/ipa/Tellsla.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress
          
          echo "✅ TestFlight upload complete"
    
    artifacts:
      - build/ipa/Tellsla.ipa
    
    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
