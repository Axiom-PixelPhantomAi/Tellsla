workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Setup App Store Connect API Key
        script: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo "✅ API key ready"
      
      - name: Archive
        script: |
          set -e
          xcodebuild \
            -project Tellsla.xcodeproj \
            -scheme Tellsla \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -archivePath build/Tellsla.xcarchive \
            -allowProvisioningUpdates \
            archive
          echo "✅ Archive created"
      
      - name: Export IPA
        script: |
          set -e
          xcodebuild -exportArchive \
            -archivePath build/Tellsla.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates
          ls -lh build/ipa/Tellsla.ipa
          echo "✅ IPA exported"
      
      - name: Upload to TestFlight
        script: |
          set -e
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/Tellsla.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress
          echo "✅ TestFlight upload complete"
    
    artifacts:
      - build/ipa/Tellsla.ipa
    
    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
