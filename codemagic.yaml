workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        XCODE_PROJECT: Tellsla.xcodeproj
        XCODE_SCHEME: Tellsla
        BUNDLE_ID: app.rork.tellsla
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Setup Credentials
        script: |
          set -e
          
          # Setup App Store Connect API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          
          # Setup fake keychain to bypass account requirement
          security create-keychain -p "" /tmp/build.keychain || true
          security default-keychain -s /tmp/build.keychain
          security unlock-keychain -p "" /tmp/build.keychain
          
          echo "✅ Credentials configured"
      
      - name: Build
        script: |
          set -e
          
          # Build without code signing entirely
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -xcconfig Release.xcconfig \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          
          echo "✅ Build completed"
      
      - name: Archive (without signing)
        script: |
          set -e
          
          xcodebuild -archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "build/Tellsla.xcarchive" \
            -derivedDataPath build \
            -xcconfig Release.xcconfig \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          
          echo "✅ Archive created (unsigned)"
          ls -lh build/Tellsla.xcarchive
      
      - name: Export & Sign IPA
        script: |
          set -e
          
          # Now sign during export with proper xcodebuild export
          xcodebuild -exportArchive \
            -archivePath "build/Tellsla.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath "build/ipa" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGNING_ALLOWED=YES
          
          echo "✅ IPA exported and signed"
          ls -lh build/ipa/Tellsla.ipa
      
      - name: Upload to TestFlight
        script: |
          set -e
          
          xcrun altool --upload-app \
            --type ios \
            --file "build/ipa/Tellsla.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress
          
          echo "✅ Upload complete - check TestFlight in App Store Connect"
    
    artifacts:
      - build/ipa/Tellsla.ipa
    
    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
