workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        XCODE_PROJECT: Tellsla.xcodeproj
        XCODE_SCHEME: Tellsla
        BUNDLE_ID: app.rork.tellsla
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Decode & Setup Credentials
        script: |
          set -e
          
          # Decode private key
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          
          echo "✅ API Key credentials ready"
      
      - name: Build & Archive (Release)
        script: |
          set -e
          
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            -archivePath "build/Tellsla.xcarchive" \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            archive
          
          echo "✅ Archive created successfully"
      
      - name: Export IPA for TestFlight
        script: |
          set -e
          
          xcodebuild -exportArchive \
            -archivePath "build/Tellsla.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath build/ipa \
            -allowProvisioningUpdates
          
          echo "✅ IPA exported successfully"
          ls -lh build/ipa/Tellsla.ipa
      
      - name: Upload to TestFlight
        script: |
          set -e
          
          if [ ! -f "build/ipa/Tellsla.ipa" ]; then
            echo "❌ IPA file not found!"
            exit 1
          fi
          
          # Upload using altool with API key authentication
          xcrun altool --upload-app \
            --file "build/ipa/Tellsla.ipa" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress
          
          echo "✅ Upload to TestFlight completed"
    
    artifacts:
      - build/ipa/Tellsla.ipa

    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
