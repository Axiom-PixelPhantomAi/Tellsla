workflows:
  ios-testflight:
    name: iOS TestFlight Build & Upload
    max_build_duration: 120
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.rork.tellsla
      vars:
        APP_STORE_CONNECT_ISSUER_ID: 23c1e19b-ffc3-4fe0-a48d-395c84ca3c0b
        APP_STORE_CONNECT_KEY_IDENTIFIER: WBU777B3N3
        APP_STORE_CONNECT_PRIVATE_KEY: 
        XCODE_PROJECT: Tellsla.xcodeproj
        XCODE_SCHEME: Tellsla
        BUNDLE_ID: app.rork.tellsla
        DEVELOPMENT_TEAM: 894G4S5K4R
    scripts:
      - name: Decode & Setup App Store Connect API Key
        script: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo "✅ App Store Connect API key configured"
      
      - name: Build & Archive for TestFlight
        script: |
          set -e
          
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            -archivePath "build/Tellsla.xcarchive" \
            -allowProvisioningUpdates \
            archive
          
          echo "✅ Archive created"
          ls -lh build/Tellsla.xcarchive
      
      - name: Export IPA for TestFlight
        script: |
          set -e
          
          xcodebuild -exportArchive \
            -archivePath "build/Tellsla.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath build/ipa \
            -allowProvisioningUpdates
          
          echo "✅ IPA exported"
          ls -lh build/ipa/Tellsla.ipa
      
      - name: Upload to TestFlight via App Store Connect API
        script: |
          set -e
          
          # Use xcrun with API key for upload
          xcrun altool \
            --upload-app \
            --type ios \
            --file "build/ipa/Tellsla.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress
          
          echo "✅ Upload to TestFlight complete"
    
    artifacts:
      - build/ipa/Tellsla.ipa
    
    publishing:
      email:
        recipients:
          - axiomops@proton.me
        notify:
          success: true
          failure: true
