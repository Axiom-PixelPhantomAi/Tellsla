name: iOS TestFlight Build & Upload

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  SCHEME: "Tellsla"
  CONFIGURATION: "Release"
  BUNDLE_ID: "app.rork.tellsla"
  TEAM_ID: "894G4S5K4R"

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          echo "✅ Xcode configured"

      - name: Install App Store Connect private key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo "✅ ASC API key installed"

      - name: Build archive (automatic signing)
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          DERIVED_DATA="$RUNNER_TEMP/build"
          ARCHIVE_PATH="$DERIVED_DATA/Tellsla.xcarchive"

          xcodebuild archive \
            -project Tellsla.xcodeproj \
            -scheme $SCHEME \
            -configuration $CONFIGURATION \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            2>&1 | grep -E "(error:|warning:|Build succeeded|Archive succeeded|FAILED)" || true

          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "❌ Archive not found: $ARCHIVE_PATH"
            exit 1
          fi
          echo "✅ Archive created"

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          DERIVED_DATA="$RUNNER_TEMP/build"
          ARCHIVE_PATH="$DERIVED_DATA/Tellsla.xcarchive"
          EXPORT_PATH="$DERIVED_DATA/export"
          mkdir -p "$EXPORT_PATH"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            2>&1 | grep -E "(error:|warning:|Export succeeded|FAILED)" || true

          IPA_FILE=$(find "$EXPORT_PATH" -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "❌ IPA not found in $EXPORT_PATH"
            ls -la "$EXPORT_PATH"
            exit 1
          fi
          echo "IPA_FILE=$IPA_FILE" >> $GITHUB_ENV
          echo "✅ IPA exported: $(basename $IPA_FILE)"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose
          echo "✅ Uploaded to TestFlight"
