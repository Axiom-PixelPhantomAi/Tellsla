name: iOS TestFlight Build & Upload

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  SCHEME: "Tellsla"
  CONFIGURATION: "Release"
  BUNDLE_ID: "app.rork.tellsla"
  TEAM_ID: "894G4S5K4R"

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          echo "✅ Xcode configured"

      - name: Install signing credentials
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          DISTRIBUTION_CERTIFICATE_P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12_PASSWORD }}
        run: |
          # Install ASC API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

          # Import distribution certificate into keychain
          echo "$DISTRIBUTION_CERTIFICATE_P12" | base64 -d > /tmp/dist.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/dist.p12 -k build.keychain -P "$DISTRIBUTION_CERTIFICATE_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm -f /tmp/dist.p12
          echo "✅ Signing credentials installed"

      - name: Install provisioning profiles
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Download profiles from ASC and install them
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          for profile_id in U322D896CS 439ZSJV664 W7R54CM73X; do
            xcrun notarytool store-credentials 2>/dev/null || true
            curl -s \
              -H "Authorization: Bearer $(python3 -c "
import jwt, time
key_id = '$APP_STORE_CONNECT_KEY_IDENTIFIER'
issuer_id = '$APP_STORE_CONNECT_ISSUER_ID'
with open(\"$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8\") as f:
    private_key = f.read()
payload = {'iss': issuer_id, 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}
print(jwt.encode(payload, private_key, algorithm='ES256', headers={'kid': key_id}))
")" \
              "https://api.appstoreconnect.apple.com/v1/profiles/$profile_id" | \
              python3 -c "
import sys, json, base64
data = json.load(sys.stdin)
content = data['data']['attributes']['profileContent']
with open('/tmp/profile_$profile_id.mobileprovision', 'wb') as f:
    f.write(base64.b64decode(content))
import subprocess
uuid_bytes = subprocess.check_output(['security', 'cms', '-D', '-i', '/tmp/profile_$profile_id.mobileprovision'])
import plistlib
plist = plistlib.loads(uuid_bytes)
uuid = plist.get('UUID', '$profile_id')
import shutil, os
dest = os.path.expanduser(f'~/Library/MobileDevice/Provisioning Profiles/{uuid}.mobileprovision')
shutil.copy('/tmp/profile_$profile_id.mobileprovision', dest)
print(f'Installed {uuid}.mobileprovision')
"
          done
          echo "✅ Provisioning profiles installed"

      - name: Build archive (unsigned)
        run: |
          set -e
          DERIVED_DATA="$RUNNER_TEMP/build"
          ARCHIVE_PATH="$DERIVED_DATA/Tellsla.xcarchive"

          xcodebuild archive \
            -project Tellsla.xcodeproj \
            -scheme $SCHEME \
            -configuration $CONFIGURATION \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SUPPORTS_MACCATALYST=NO \
            2>&1 | grep -E "(error:|warning:|Build succeeded|Archive succeeded|FAILED)" || true

          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "❌ Archive not found: $ARCHIVE_PATH"
            ls -la "$DERIVED_DATA" || true
            exit 1
          fi
          echo "✅ Archive created"

      - name: Export IPA
        run: |
          set -e
          DERIVED_DATA="$RUNNER_TEMP/build"
          ARCHIVE_PATH="$DERIVED_DATA/Tellsla.xcarchive"
          EXPORT_PATH="$DERIVED_DATA/export"
          mkdir -p "$EXPORT_PATH"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            2>&1 | grep -E "(error:|warning:|Export succeeded|FAILED)" || true

          IPA_FILE=$(find "$EXPORT_PATH" -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "❌ IPA not found in $EXPORT_PATH"
            ls -la "$EXPORT_PATH"
            exit 1
          fi
          echo "IPA_FILE=$IPA_FILE" >> $GITHUB_ENV
          echo "✅ IPA exported: $(basename $IPA_FILE)"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose
          echo "✅ Uploaded to TestFlight"
